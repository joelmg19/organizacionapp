name: producti_app
description: Aplicación móvil de organización personal y productividad avanzada
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  
  # State Management
  provider: ^6.1.1
  
  # Charts
  fl_chart: ^0.66.0
  
  # Navigation
  go_router: ^13.0.0
  
  # Date & Time
  intl: ^0.19.0
  table_calendar: ^3.0.9
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Animations
  lottie: ^3.0.0
  
  # Utilities
  uuid: ^4.3.3
  firebase_core: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

  
flutter:
  uses-material-design: true
  
  # Uncomment if you want to add custom assets
  # assets:
  #   - assets/images/
  #   - assets/icons/
